name: Bootstrap Playwright adapter

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  restore-and-validate:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'agent/playwright-adapter'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/playwright-adapter
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack install
          pnpm --version
      - name: Restore reviewed adapter payload
        run: |
          cat .bootstrap/playwright-adapter.part.* > /tmp/playwright-adapter.tar.gz.b64
          echo "89c785f2262834f9057ad2c6330be5e39fcad09c8f141cfc620576311ab9fef6  /tmp/playwright-adapter.tar.gz.b64" | sha256sum --check
          base64 --decode /tmp/playwright-adapter.tar.gz.b64 > /tmp/playwright-adapter.tar.gz
          echo "3a7bcfe2f3f18da4b1433bfa89cb0405519c1322ae47f2a13d766345983e3a56  /tmp/playwright-adapter.tar.gz" | sha256sum --check
          tar -xzf /tmp/playwright-adapter.tar.gz
      - run: pnpm install --lockfile-only
      - run: pnpm install --frozen-lockfile
      - run: pnpm qa
      - run: pnpm --filter @motionguard/playwright exec playwright install --with-deps chromium
      - run: pnpm --filter @motionguard/playwright test:e2e
      - name: Commit validated adapter
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md SECURITY.md .github/workflows/browser-e2e.yml docs/architecture/0003-playwright-capture-boundary.md reports/002b-playwright-adapter.md packages/playwright pnpm-lock.yaml
          git diff --cached --quiet || git commit -m "add isolated Playwright capture adapter"
          git push origin HEAD:agent/playwright-adapter
