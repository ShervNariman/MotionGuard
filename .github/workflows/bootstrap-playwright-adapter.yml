name: Bootstrap Playwright adapter

on:
  push:
    branches: [agent/playwright-adapter]

permissions:
  contents: write

jobs:
  restore-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack install
          pnpm --version
      - name: Restore reviewed adapter payload
        run: |
          base64 --decode .bootstrap/playwright-adapter.tar.gz.b64 > /tmp/playwright-adapter.tar.gz
          tar -xzf /tmp/playwright-adapter.tar.gz
      - run: pnpm install --lockfile-only
      - run: pnpm install --frozen-lockfile
      - run: pnpm qa
      - run: pnpm --filter @motionguard/playwright exec playwright install --with-deps chromium
      - run: pnpm --filter @motionguard/playwright test:e2e
      - name: Commit validated adapter
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md SECURITY.md .github/workflows/browser-e2e.yml docs/architecture/0003-playwright-capture-boundary.md reports/002b-playwright-adapter.md packages/playwright pnpm-lock.yaml
          git diff --cached --quiet || git commit -m "add isolated Playwright capture adapter"
          git push
