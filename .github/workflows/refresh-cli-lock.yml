name: Diagnose CLI QA

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'agent/cli-reporting-qa'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/cli-reporting-qa
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack install
          pnpm --version
      - run: pnpm install --frozen-lockfile
      - name: Run five-loop QA and preserve concise failure
        run: |
          set +e
          pnpm qa > /tmp/motionguard-cli-qa.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            mkdir -p .qa
            tail -n 240 /tmp/motionguard-cli-qa.log > .qa/cli-failure.log
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .qa/cli-failure.log
            git commit -m "record CLI QA failure evidence"
            git push origin HEAD:agent/cli-reporting-qa
            exit "$status"
          fi
          cat /tmp/motionguard-cli-qa.log
