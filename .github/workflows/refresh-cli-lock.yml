name: Refresh CLI lockfile

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  refresh:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'agent/cli-reporting-qa'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/cli-reporting-qa
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack install
          pnpm --version
      - run: pnpm install --lockfile-only
      - name: Commit lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git diff --cached --quiet || git commit -m "refresh CLI dependency lockfile"
          git push origin HEAD:agent/cli-reporting-qa
