name: Browser E2E

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: browser-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chromium:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack install
          pnpm --version
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @motionguard/playwright exec playwright install --with-deps chromium
      - run: pnpm --filter @motionguard/playwright test:e2e
      - run: pnpm --filter @motionguard/cli test:e2e
