<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">MotionGuard Milestone 001 proof card</title>
  <desc id="desc">Foundation and governance milestone merged after five release gates passed. The browser stress engine is next and is not yet shipped.</desc>
  <rect width="1920" height="1080" fill="#0b0e12"/>
  <rect x="70" y="55" width="1780" height="970" rx="34" fill="#13181f" stroke="#282f39" stroke-width="2"/>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="125" y="170" font-size="74" font-weight="700" fill="#f4f6f8">MotionGuard</text>
    <text x="127" y="220" font-size="30" fill="#97a0ab">Milestone 001 · Foundation &amp; Governance</text>

    <rect x="1510" y="112" width="268" height="62" rx="31" fill="#14402e" stroke="#2a7e58" stroke-width="2"/>
    <circle cx="1551" cy="143" r="11" fill="#4bdc96"/>
    <text x="1580" y="151" font-size="24" font-weight="700" fill="#4bdc96">MERGED</text>

    <text x="125" y="315" font-size="34" font-weight="700" fill="#f4f6f8">A production-grade base before the browser engine.</text>
    <text x="125" y="365" font-size="27" fill="#5c96ff">PR #1 · main · 61be124 · exact-head CI and CodeQL passed</text>

    <g>
      <rect x="125" y="410" width="315" height="116" rx="20" fill="#0e241b" stroke="#26694b" stroke-width="2"/>
      <circle cx="159" cy="455" r="17" fill="#4bdc96"/><path d="M149 455l8 8 14-19" fill="none" stroke="#071c12" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="203" y="460" font-size="22" fill="#f4f6f8">Requirements</text><text x="203" y="500" font-size="24" font-weight="700" fill="#4bdc96">PASS</text>

      <rect x="465" y="410" width="315" height="116" rx="20" fill="#0e241b" stroke="#26694b" stroke-width="2"/>
      <circle cx="499" cy="455" r="17" fill="#4bdc96"/><path d="M489 455l8 8 14-19" fill="none" stroke="#071c12" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="543" y="460" font-size="22" fill="#f4f6f8">Static quality</text><text x="543" y="500" font-size="24" font-weight="700" fill="#4bdc96">PASS</text>

      <rect x="805" y="410" width="315" height="116" rx="20" fill="#0e241b" stroke="#26694b" stroke-width="2"/>
      <circle cx="839" cy="455" r="17" fill="#4bdc96"/><path d="M829 455l8 8 14-19" fill="none" stroke="#071c12" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="883" y="460" font-size="22" fill="#f4f6f8">11 tests</text><text x="883" y="500" font-size="24" font-weight="700" fill="#4bdc96">PASS</text>

      <rect x="1145" y="410" width="315" height="116" rx="20" fill="#0e241b" stroke="#26694b" stroke-width="2"/>
      <circle cx="1179" cy="455" r="17" fill="#4bdc96"/><path d="M1169 455l8 8 14-19" fill="none" stroke="#071c12" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="1223" y="460" font-size="22" fill="#f4f6f8">Experience contract</text><text x="1223" y="500" font-size="24" font-weight="700" fill="#4bdc96">PASS</text>

      <rect x="1485" y="410" width="315" height="116" rx="20" fill="#0e241b" stroke="#26694b" stroke-width="2"/>
      <circle cx="1519" cy="455" r="17" fill="#4bdc96"/><path d="M1509 455l8 8 14-19" fill="none" stroke="#071c12" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="1563" y="460" font-size="22" fill="#f4f6f8">Release readiness</text><text x="1563" y="500" font-size="24" font-weight="700" fill="#4bdc96">PASS</text>
    </g>

    <rect x="125" y="585" width="805" height="335" rx="24" fill="#0e1218" stroke="#282f39" stroke-width="2"/>
    <text x="165" y="640" font-size="24" font-weight="700" fill="#97a0ab">SHIPPED</text>
    <g font-size="27" fill="#f4f6f8">
      <circle cx="172" cy="691" r="6" fill="#4bdc96"/><text x="196" y="701">AI OS manager, QA, and code-health gates</text>
      <circle cx="172" cy="739" r="6" fill="#4bdc96"/><text x="196" y="749">Strict TypeScript core / CLI / reporter packages</text>
      <circle cx="172" cy="787" r="6" fill="#4bdc96"/><text x="196" y="797">ESM + CommonJS package-consumer validation</text>
      <circle cx="172" cy="835" r="6" fill="#4bdc96"/><text x="196" y="845">Guarded cross-platform cleanup and security policy</text>
      <circle cx="172" cy="883" r="6" fill="#4bdc96"/><text x="196" y="893">Cursor rules, dev container, CI, CodeQL, Dependabot</text>
    </g>

    <rect x="985" y="585" width="810" height="335" rx="24" fill="#0e1218" stroke="#282f39" stroke-width="2"/>
    <text x="1025" y="640" font-size="24" font-weight="700" fill="#97a0ab">TRUTHFUL PRODUCT STATE</text>
    <text x="1025" y="700" font-size="34" font-weight="700" fill="#4bdc96">Foundation shipped.</text>
    <text x="1025" y="750" font-size="27" fill="#f4f6f8">The browser stress engine is next—</text>
    <text x="1025" y="792" font-size="27" fill="#f4f6f8">not yet claimed as shipped.</text>
    <line x1="1025" y1="825" x2="1738" y2="825" stroke="#282f39" stroke-width="2"/>
    <text x="1025" y="865" font-size="22" fill="#97a0ab">Next: moving target · interrupted state ·</text>
    <text x="1025" y="897" font-size="22" fill="#97a0ab">exited-but-interactive · reduced-motion mismatch</text>

    <text x="125" y="985" font-size="22" fill="#97a0ab">Break your animations before users do.</text>
    <text x="1440" y="985" font-size="22" fill="#97a0ab">github.com/ShervNariman/MotionGuard</text>
  </g>
</svg>
